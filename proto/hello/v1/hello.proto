syntax = "proto3";

package hello.v1;

option java_package = "com.course.central.proto.hello";

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string greet = 1;
}

service HelloService {
  rpc SayHelloUnaryOne(SayHelloRequest) returns (SayHelloResponse) {}
  rpc SayHelloUnaryTwo(SayHelloRequest) returns (SayHelloResponse) {}

  rpc SayHelloServerStreamOne(SayHelloRequest) returns (stream SayHelloResponse) {}
  rpc SayHelloServerStreamTwo(SayHelloRequest) returns (stream SayHelloResponse)

  rpc SayHelloClientStreamOne(stream SayHelloRequest) returns (SayHelloResponse) {}
  rpc SayHelloClientStreamTwo(stream SayHelloRequest) returns (SayHelloResponse) {}

  rpc SayHelloBidirectionalStreamOne(stream SayHelloRequest) returns (stream SayHelloResponse) {}
  rpc SayHelloBidirectionalStreamTwo(stream SayHelloRequest) returns (stream SayHelloResponse) {}
}
